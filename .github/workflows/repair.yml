name: Emergency Repair Sync

on:
  workflow_dispatch: # Manual "Run" button in the Actions tab

jobs:
  repair:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sync Script
        run: python sync_translations.py

      - name: Commit and Push Fix
        run: |
          git config --global user.name "Repair Bot"
          git config --global user.email "bot@getaidiscounts.com"
          git add src/i18n/tool-translations.json
          git commit -m "Emergency Repair: Restoring Translations" || echo "No changes to commit"
          git push
