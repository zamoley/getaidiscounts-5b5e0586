name: Monday Narnia Harvest

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at Midnight UTC
  workflow_dispatch: # Allows manual run

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so we can rebase safely

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Harvester
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python harvester.py

      - name: Run Translator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python translator.py

      - name: Sync Translations to Live Site
        run: python sync_translations.py

      - name: Commit and Push
        run: |
          git config --global user.name "AI Narnia Scout"
          git config --global user.email "scout@getaidiscounts.com"

          # Stage all script-generated changes FIRST so git pull --rebase
          # doesn't fail with "unstaged changes" error
          git add ai_deals.json src/i18n/*.json

          # Pull latest remote changes before committing to avoid rebase conflicts
          git pull --rebase origin main

          git commit -m "Monday Narnia Update: New Tools & Categories [skip ci]" || echo "No changes to commit"
          git push origin main
