name: Live Site Translation Sync

on:
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Sync Script
        run: python sync_translations.py

      - name: Push to Site
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add src/i18n/tool-translations.json
          git commit -m "Updating live site translations" || echo "No changes"
          git push
